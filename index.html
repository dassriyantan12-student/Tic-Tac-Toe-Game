<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="home_and_decoration.css">
    <link rel="stylesheet" href="maingame.css">
</head>
<body>
    <h1>Tic-Tac-Toe</h1>
    <div class="box">
        <button id="play">PLAY</button>
        <button id="exit">EXIT</button>
    </div>
    <dialog>
        <h3>Game Rules</h3>
        <ul>
            <li>'X' and 'O' will get alternate turns.</li>
            <li>To win, one has to connect his/her 'X' or 'O' horizontally, vertically or diagonally.</li>
            <li>'X' will get the first turn.</li>
        </ul>
        <button id="close">Good Luck</button>
    </dialog>
    <div id="game">
        <div id="mainGame">
            <button class="sqr first"></button>
            <button class="sqr second"></button>
            <button class="sqr third"></button>
            <button class="sqr fourth"></button>
            <button class="sqr fifth"></button>
            <button class="sqr sixth"></button>
            <button class="sqr seventh"></button>
            <button class="sqr eighth"></button>
            <button class="sqr ninth"></button>
            <div class="line1"></div>
            <div class="line2"></div>
            <div class="line3"></div>
            <div class="line4"></div>
        </div>
        <div id="scoreCard">
            <h2><u>Score Card</u></h2>
            <div class="score">
                <span id="X">
                    <img src="Cross.png">
                    <p id="cross"></p>
                </span>
                <span id="O">
                    <img src="Circle.png">
                    <p id="circle"></p>
                </span>
            </div>
            <div class="btnContain">
                <button class="reset">
                    <i class="fa-solid fa-arrow-rotate-left" style="color: #000000;"></i>
                    <h5>RESET</h5>
                </button>
                <button class="home">
                <i class="fa-regular fa-house" style="color: #FFFFFF;"></i>
                    <h5>HOME</h5>
                </button>
            </div>
        </div>
    </div>
    <script src="gameFunction.js"></script>
</body>
</html>
